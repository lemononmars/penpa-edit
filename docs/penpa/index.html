<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Penpa legacy working draft</title>
    <link rel="icon" type="image/svg+xml" href="../favicon.svg">
    <style>
        html, body, iframe { width: 100%; height: 100%; margin: 0; border: 0; overflow: hidden; }
    </style>
</head>
<body>
<iframe id="penpa-legacy" title="Penpa legacy working draft"></iframe>
<script>
    var target = new URL("../", window.location.href);
    new URLSearchParams(window.location.search).forEach(function(value, key) {
        target.searchParams.set(key, value);
    });
    target.searchParams.set("penpa", "legacy");
    target.hash = window.location.hash;
    document.getElementById("penpa-legacy").src = target.toString();
</script>
</body>
</html>
